<!doctype html>
<html lang="{{ ui_lang|default('en') }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-title" content="Pocket Pro">
    <title>{{ page_title }} | Pocket Pro</title>
    <style>
        :root {
            color-scheme: dark;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 34%),
                radial-gradient(circle at top right, rgba(139,92,246,0.2), transparent 30%),
                #090d17;
            color: #eef2ff;
        }
        .shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px 18px;
        }
        .card {
            width: min(760px, 100%);
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
            padding: 28px;
        }
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #8b5cf6;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 13px;
        }
        h1 {
            margin: 14px 0 10px;
            font-size: clamp(32px, 6vw, 52px);
            line-height: 1.02;
        }
        .intro {
            margin: 0 0 24px;
            color: #cbd5e1;
            line-height: 1.75;
            font-size: 16px;
        }
        .section {
            border-top: 1px solid rgba(148, 163, 184, 0.14);
            padding-top: 20px;
            margin-top: 20px;
        }
        .section h2 {
            margin: 0 0 10px;
            font-size: 22px;
        }
        ul {
            margin: 0;
            padding-left: 20px;
            color: #dbe4ff;
            line-height: 1.8;
        }
        .footer {
            margin-top: 26px;
            color: #94a3b8;
            font-size: 14px;
        }
        a {
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="card">
            <div class="eyebrow">Pocket Pro</div>
            <h1>{{ page_heading }}</h1>
            <p class="intro">{{ intro_text }}</p>
            {% for heading, items in sections %}
            <section class="section">
                <h2>{{ heading }}</h2>
                <ul>
                    {% for item in items %}
                    <li>{{ item }}</li>
                    {% endfor %}
                </ul>
            </section>
            {% endfor %}
            <div class="footer">
                Pocket Pro is dedicated to personal money management on this domain.
            </div>
        </section>
    </main>
</body>
</html>
